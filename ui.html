<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gyroscope Motion UI</title>

    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #0b0b0b;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      button {
        padding: 10px 20px;
        margin-bottom: 20px;
        background: #0ff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #000;
        font-weight: bold;
      }

      /* 📱 PHONE FRAME */
      #phone {
        width: 180px;
        height: 320px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        margin-bottom: 20px;
      }

      /* SCREEN */
      #screen {
        width: 150px;
        height: 280px;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at center, #1a1a1a, #000);
      }

      /* HORIZON LINE */
      #horizon {
        position: absolute;
        width: 200%;
        height: 2px;
        background: rgba(0, 255, 255, 0.5);
        top: 50%;
        left: -50%;
        transform-origin: center;
      }

      /* CENTER DOT */
      #dot {
        width: 14px;
        height: 14px;
        background: #0ff;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 18px #0ff;
      }

      .data {
        font-size: 12px;
        opacity: 0.8;
        line-height: 1.6;
      }
    </style>
  </head>

  <body>
    <button id="startBtn">Enable Gyroscope</button>

    <div id="phone">
      <div id="screen">
        <div id="horizon"></div>
        <div id="dot"></div>
      </div>
    </div>

    <div class="data">
      alpha: <span id="alpha">0</span><br />
      beta: <span id="beta">0</span><br />
      gamma: <span id="gamma">0</span>
    </div>

    <script>
      const startBtn = document.getElementById("startBtn");

      const horizon = document.getElementById("horizon");
      const dot = document.getElementById("dot");

      const alphaEl = document.getElementById("alpha");
      const betaEl = document.getElementById("beta");
      const gammaEl = document.getElementById("gamma");

      function handleOrientation(event) {
        const { alpha, beta, gamma } = event;

        alphaEl.textContent = alpha?.toFixed(2);
        betaEl.textContent = beta?.toFixed(2);
        gammaEl.textContent = gamma?.toFixed(2);

        // 🌐 horizon tilt (left/right rotation feel)
        horizon.style.transform = `rotate(${gamma}deg)`;

        // 🎯 dot movement (gravity simulation)
        const maxMove = 30;

        const x = (gamma / 45) * maxMove;
        const y = (beta / 45) * maxMove;

        dot.style.transform = `
          translate(-50%, -50%)
          translate(${x}px, ${y}px)
        `;
      }

      function enableGyro() {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          DeviceOrientationEvent.requestPermission()
            .then((state) => {
              if (state === "granted") {
                window.addEventListener("deviceorientation", handleOrientation);
                startBtn.style.display = "none";
              }
            })
            .catch(console.error);
        } else {
          window.addEventListener("deviceorientation", handleOrientation);
          startBtn.style.display = "none";
        }
      }

      startBtn.addEventListener("click", enableGyro);
    </script>
  </body>
</html>
